<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi perfil</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>

<body class="bg-dark-subtle">
    <div class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg p-0 fixed-top">
            <div class="container-fluid text-bg-warning mt-0">
                <div class="badge d-flex align-items-center">
                    <img src="imagenes/logo.png" alt="logo" width="60" height="60" />
                    <a class="navbar-brand fw-light fs-1" href="index.html">Burguer PIPW</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0" data-menu></ul>
                </div>
            </div>
        </nav>

        <main class="container mt-5 pt-5">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-6">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning">
                            <h1 class="h4 mb-0">Mis datos</h1>
                        </div>

                        <div class="card-body">
                            <p class="mb-3 text-secondary" id="textoRolUsuario"></p>

                            <form id="formularioPerfil" novalidate>
                                <input type="hidden" id="inputIdUsuarioPerfil" />

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputNombreCompletoPerfil" placeholder="Nombre completo" />
                                    <label for="inputNombreCompletoPerfil">Nombre completo</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputDireccionPerfil" placeholder="Dirección" />
                                    <label for="inputDireccionPerfil">Dirección</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputTelefonoPerfil" placeholder="Teléfono" />
                                    <label for="inputTelefonoPerfil">Teléfono</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="inputEmailPerfil" placeholder="Email" />
                                    <label for="inputEmailPerfil">Email</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="inputPasswordPerfil" placeholder="Password" />
                                    <label for="inputPasswordPerfil">Password</label>
                                </div>

                                <button type="submit" class="btn btn-warning w-100 fw-semibold">Guardar cambios</button>
                                <div id="mensajePerfil" class="d-none"></div>
                            </form>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/modulos/menu.js"></script>
    <script type="module" src="js/perfil.js"></script>
</body>

</html>
