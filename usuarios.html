<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>usuarios</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>

<body class="bg-dark-subtle">
    <div class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg p-0 fixed-top">
            <div class="container-fluid text-bg-warning mt-0">
                <div class="badge d-flex align-items-center">
                    <img src="imagenes/logo.png" alt="" width="60" height="60" />
                    <a class="navbar-brand fw-light fs-1" href="index.html">Burguer PIPW</a>
                </div>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0" data-menu></ul>
                </div>
            </div>
        </nav>



        <main class="container mt-5 pt-5">
            <div class="row g-4">
                <div class="col-12 col-lg-7">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning">
                            <h3 class="text-center mb-0">Listado de usuarios</h3>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-bordered table-hover mb-0">
                                <thead class="table-warning">
                                    <tr>
                                        <th scope="col">Nombre</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Rol</th>
                                        <th scope="col">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-light" id="bodyTableListadoDeUsuarios"></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div class="col-12 col-lg-5">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning">
                            <h3 class="text-center mb-0">Editar usuario</h3>
                        </div>

                        <div class="card-body">
                            <form id="formularioEditarUsuario" novalidate>
                                <input type="hidden" id="inputIdUsuario" />

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputNombreCompleto" placeholder="Nombre completo" />
                                    <label for="inputNombreCompleto">Nombre completo</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputDireccion" placeholder="Direccion" />
                                    <label for="inputDireccion">Dirección</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputTelefono" placeholder="Telefono" />
                                    <label for="inputTelefono">Teléfono</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="inputEmail" placeholder="Email" />
                                    <label for="inputEmail">Email</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <input type="password" class="form-control" id="inputPassword" placeholder="Password" />
                                    <label for="inputPassword">Password</label>
                                </div>

                                <div class="form-floating mb-3">
                                    <select class="form-select" id="inputRol">
                                        <option value="cliente">cliente</option>
                                        <option value="admin">admin</option>
                                    </select>
                                    <label for="inputRol">Rol</label>
                                </div>

                                <button type="submit" class="btn btn-warning w-100 fw-semibold">Guardar cambios</button>
                                <div id="mensajeUsuarios" class="d-none"></div>
                            </form>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/modulos/menu.js"></script>
    <script type="module" src="js/usuarios.js"></script>
</body>

</html>
