<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear productos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>

<body class="bg-dark-subtle">
    <div class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg p-0 fixed-top">
            <div class="container-fluid text-bg-warning mt-0">
                <div class="badge d-flex align-items-center">
                    <img src="imagenes/logo.png" alt="logo" width="60" height="60" />
                    <a class="navbar-brand fw-light fs-1" href="index.html">Burguer PIWP</a>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0" data-menu></ul>
                </div>
                <div id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0" data-menu></ul>
                </div>
            </div>
        </nav>

        <main class="container mt-5 pt-5">
            <div class="row g-4">
                <div class="col-12 col-lg-5">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning">
                            <h1 class="h4 mb-0">Crear producto</h1>
                        </div>
                        <div class="card-body">
                            <form id="formularioProducto" novalidate>
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputNombreProducto" placeholder="Hamburguesa triple" />
                                    <label for="inputNombreProducto">Nombre del producto</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputDescripcionProducto" placeholder="Descripcion" />
                                    <label for="inputDescripcionProducto">Descripción</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" id="inputStockProducto" placeholder="Stock" min="0" />
                                    <label for="inputStockProducto">Stock</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" id="inputPrecioProducto" placeholder="Precio" min="0" />
                                    <label for="inputPrecioProducto">Precio</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputImagenProducto" placeholder="imagenes/logo.png" />
                                    <label for="inputImagenProducto">Imagen</label>
                                </div>
                                <button type="submit" class="btn btn-danger w-100 fw-semibold">Crear producto</button>
                                <div id="mensajeProductos" class="d-none"></div>
                            </form>
                        </div>
                    </section>
                </div>

                <div class="col-12 col-lg-7">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning d-flex justify-content-between align-items-center">
                            <h2 class="h4 mb-0">Productos cargados</h2>
                            <a class="btn btn-outline-dark btn-sm" href="editar_productos.html">editar producto </a>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover mb-0">
                                <thead class="table-warning">
                                    <tr>
                                        <th scope="col">Producto</th>
                                        <th scope="col">Descripción</th>
                                        <th scope="col">Stock</th>
                                        <th scope="col">Precio</th>
                                        <th scope="col">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-light" data-productos-tabla></tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/modulos/menu.js"></script>
    <script type="module" src="js/productos.js"></script>
</body>

</html>
