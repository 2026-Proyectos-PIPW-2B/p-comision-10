<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar productos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>

<body class="bg-dark-subtle">
    <div class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg p-0 fixed-top">
            <div class="container-fluid text-bg-warning mt-0">
                <div class="badge d-flex align-items-center">
                    <img src="imagenes/logo.png" alt="logo" width="60" height="60" />
                    <a class="navbar-brand fw-light fs-1" href="#">Burguer PIWP</a>
                </div>

                <div id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="btn btn-outline-danger p-2 m-2" href="index.html">Volver</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container mt-5 pt-5">
            <div class="row g-4">
                <div class="col-12 col-lg-5">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning">
                            <h1 class="h4 mb-0">Editar producto</h1>
                        </div>
                        <div class="card-body">
                            <form id="formularioEdicionProducto" novalidate>
                                <input type="hidden" id="inputIdProductoEditar" />
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputNombreProductoEditar" placeholder="Hamburguesa triple" />
                                    <label for="inputNombreProductoEditar">Nombre del producto</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputDescripcionProductoEditar" placeholder="Descripcion" />
                                    <label for="inputDescripcionProductoEditar">Descripción</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" id="inputStockProductoEditar" placeholder="Stock" min="0" />
                                    <label for="inputStockProductoEditar">Stock</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" id="inputPrecioProductoEditar" placeholder="Precio" min="0" />
                                    <label for="inputPrecioProductoEditar">Precio</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="inputImagenProductoEditar" placeholder="imagenes/logo.png" />
                                    <label for="inputImagenProductoEditar">Imagen</label>
                                </div>
                                <button type="submit" class="btn btn-warning w-100 fw-semibold">Guardar cambios</button>
                                <div id="mensajeEdicionProductos" class="d-none"></div>
                            </form>
                        </div>
                    </section>
                </div>

                <div class="col-12 col-lg-7">
                    <section class="card border-warning shadow-sm">
                        <div class="card-header text-bg-warning d-flex justify-content-between align-items-center">
                            <h2 class="h4 mb-0">Listado de productos</h2>
                            <a class="btn btn-outline-dark btn-sm" href="crear_productos.html">crear producti</a>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover mb-0">
                                <thead class="table-warning">
                                    <tr>
                                        <th scope="col">Producto</th>
                                        <th scope="col">Descripción</th>
                                        <th scope="col">Stock</th>
                                        <th scope="col">Precio</th>
                                        <th scope="col">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-light" data-productos-tabla></tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/productos.js"></script>
</body>

</html>
